services:
  # Container where Katran XDP program is attached and control plane tests run
  katran-target:
    build:
      context: .
      dockerfile: tests/integration/Dockerfile
    container_name: katran-target
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    volumes:
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /lib/modules:/lib/modules:ro
      - /sys/fs/bpf:/sys/fs/bpf:rw
    networks:
      katran-testnet:
        ipv4_address: 10.200.0.10
    environment:
      - KATRAN_BPF_PATH=/app/katran-bpfs
      - KATRAN_PIN_PATH=/sys/fs/bpf/katran
      - KATRAN_INTERFACE=eth0
    command: /bin/bash -c "sleep infinity"

networks:
  katran-testnet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.200.0.0/24
