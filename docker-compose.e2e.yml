# Multi-container E2E test environment for Katran control plane.
#
# Validates the full packet path:
#   client -> XDP load balancer (IPIP encap) -> backend (IPIP decap) -> DSR reply
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   docker exec katran-e2e-client pytest tests/e2e/ -v
#   docker compose -f docker-compose.e2e.yml down -v

services:
  # Load balancer: XDP program + control plane API on :8080
  katran-lb:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    container_name: katran-e2e-lb
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    volumes:
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /lib/modules:/lib/modules:ro
      - /sys/fs/bpf:/sys/fs/bpf:rw
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.10
        ipv6_address: "fd00:200::10"
    environment:
      - KATRAN_BPF_PATH=/app/katran-bpfs
      - KATRAN_PIN_PATH=/sys/fs/bpf/katran
      - KATRAN_INTERFACE=eth0
      - KATRAN_API_HOST=0.0.0.0
      - KATRAN_API_PORT=8080
      - KATRAN_FEATURES=src_routing,inline_decap,direct_healthchecking
      - KATRAN_TUNNEL_BASED_HC=true
    entrypoint: ["/bin/bash", "/app/tests/e2e/scripts/lb-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  # Backend 1: IPIP decap + simple HTTP server
  backend-1:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.backend
    container_name: katran-e2e-backend-1
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /lib/modules:/lib/modules:ro
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.20
        ipv6_address: "fd00:200::20"
    environment:
      - BACKEND_NAME=backend-1
      - BACKEND_ADDR=10.200.0.20
      - VIP_ADDR=10.200.0.10
      - VIP_ADDR6=fd00:200::10
      - HTTP_PORT=80
      - EXTRA_VIP_ADDRS=10.200.0.40 10.200.0.41 10.200.0.42 10.200.0.43 10.200.0.44 10.200.0.45 10.200.0.46 10.200.0.47 10.200.0.48
      - EXTRA_VIP_ADDRS6=fd00:200::40 fd00:200::41 fd00:200::42 fd00:200::43 fd00:200::44 fd00:200::45 fd00:200::46 fd00:200::47 fd00:200::48
    entrypoint: ["/bin/bash", "/app/scripts/backend-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Backend 2: IPIP decap + simple HTTP server
  backend-2:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.backend
    container_name: katran-e2e-backend-2
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /lib/modules:/lib/modules:ro
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.21
        ipv6_address: "fd00:200::21"
    environment:
      - BACKEND_NAME=backend-2
      - BACKEND_ADDR=10.200.0.21
      - VIP_ADDR=10.200.0.10
      - VIP_ADDR6=fd00:200::10
      - HTTP_PORT=80
      - EXTRA_VIP_ADDRS=10.200.0.40 10.200.0.41 10.200.0.42 10.200.0.43 10.200.0.44 10.200.0.45 10.200.0.46 10.200.0.47 10.200.0.48
      - EXTRA_VIP_ADDRS6=fd00:200::40 fd00:200::41 fd00:200::42 fd00:200::43 fd00:200::44 fd00:200::45 fd00:200::46 fd00:200::47 fd00:200::48
    entrypoint: ["/bin/bash", "/app/scripts/backend-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Backend 3: Source routing traffic target
  backend-3:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.backend
    container_name: katran-e2e-backend-3
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /lib/modules:/lib/modules:ro
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.22
        ipv6_address: "fd00:200::22"
    environment:
      - BACKEND_NAME=backend-3
      - BACKEND_ADDR=10.200.0.22
      - VIP_ADDR=10.200.0.10
      - VIP_ADDR6=fd00:200::10
      - HTTP_PORT=80
      - EXTRA_VIP_ADDRS=10.200.0.40 10.200.0.41 10.200.0.42 10.200.0.43 10.200.0.44 10.200.0.45 10.200.0.46 10.200.0.47 10.200.0.48
      - EXTRA_VIP_ADDRS6=fd00:200::40 fd00:200::41 fd00:200::42 fd00:200::43 fd00:200::44 fd00:200::45 fd00:200::46 fd00:200::47 fd00:200::48
    entrypoint: ["/bin/bash", "/app/scripts/backend-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # HC target: captures IPIP HC probes for test verification
  hc-target:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile.backend
    container_name: katran-e2e-hc-target
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.30
        ipv6_address: "fd00:200::30"
    entrypoint: ["python3", "/app/scripts/hc-target-server.py"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Test client: runs pytest against the LB API and VIP
  test-client:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    container_name: katran-e2e-client
    networks:
      katran-e2e-net:
        ipv4_address: 10.200.0.100
        ipv6_address: "fd00:200::100"
    environment:
      - KATRAN_E2E=1
      - KATRAN_API_URL=http://katran-lb:8080
      - KATRAN_VIP_ADDR=10.200.0.10
      - KATRAN_VIP6_ADDR=fd00:200::10
      - BACKEND_1_ADDR=10.200.0.20
      - BACKEND_1_ADDR6=fd00:200::20
      - BACKEND_2_ADDR=10.200.0.21
      - BACKEND_2_ADDR6=fd00:200::21
      - BACKEND_3_ADDR=10.200.0.22
      - BACKEND_3_ADDR6=fd00:200::22
      - HC_TARGET_ADDR=10.200.0.30
      - HC_TARGET_ADDR6=fd00:200::30
      - HC_TARGET_URL=http://hc-target:8080
      - TEST_CLIENT_ADDR=10.200.0.100
      - TEST_CLIENT_ADDR6=fd00:200::100
    depends_on:
      katran-lb:
        condition: service_healthy
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
      hc-target:
        condition: service_healthy
    command: ["sleep", "infinity"]

networks:
  katran-e2e-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.200.0.0/24
        - subnet: "fd00:200::/64"
